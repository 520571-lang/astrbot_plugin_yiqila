<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="#8B4513"/>
  
  <!-- 马桶轮廓 -->
  <ellipse cx="50" cy="65" rx="25" ry="18" fill="#FFFFFF"/>
  <ellipse cx="50" cy="62" rx="18" ry="12" fill="#E0E0E0"/>
  
  <!-- 马桶水箱 -->
  <rect x="35" y="25" width="30" height="25" rx="3" fill="#FFFFFF"/>
  <rect x="38" y="28" width="24" height="18" rx="2" fill="#F5F5F5"/>
  
  <!-- 冲水按钮 -->
  <circle cx="50" cy="33" r="4" fill="#4CAF50"/>
  
  <!-- 便便图标 -->
  <g transform="translate(50, 55)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#5D4037"/>
    <ellipse cx="0" cy="-6" rx="5" ry="4" fill="#5D4037"/>
    <ellipse cx="0" cy="-11" rx="4" ry="3" fill="#5D4037"/>
  </g>
  
  <!-- 蒸汽/气味效果 -->
  <g stroke="#B0BEC5" stroke-width="2" fill="none" opacity="0.6">
    <path d="M45 20 Q42 15 45 10">
      <animate attributeName="d" values="M45 20 Q42 15 45 10;M45 18 Q48 13 45 8;M45 20 Q42 15 45 10" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M50 18 Q47 13 50 8">
      <animate attributeName="d" values="M50 18 Q47 13 50 8;M50 16 Q53 11 50 6;M50 18 Q47 13 50 8" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M55 20 Q52 15 55 10">
      <animate attributeName="d" values="M55 20 Q52 15 55 10;M55 18 Q58 13 55 8;M55 20 Q52 15 55 10" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 小装饰 - 表示"一起" -->
  <circle cx="20" cy="50" r="5" fill="#FFD700" opacity="0.8"/>
  <circle cx="80" cy="50" r="5" fill="#FFD700" opacity="0.8"/>
</svg>